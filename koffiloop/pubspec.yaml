name: koffiloop
description: "KofiLoop - Multi-Vendor Coffee Marketplace"
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  http: ^1.2.1
  provider: ^6.1.5+1
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  geolocator: ^11.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  google_sign_in: ^6.2.1  
  google_sign_in_android: ^6.1.30
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  firebase_app_check: ^0.4.0

 

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/coffee_bg.jpeg
    - assets/images/logo-white.png
    - assets/images/google_logo.png
    - assets/images/onboarding_cafe1.jpeg
    - assets/images/onboarding_cafe2.jpeg
    - assets/images/onboarding_cafe3.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-white.png"